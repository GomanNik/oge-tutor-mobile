name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PNPM_VERSION: 9.15.9
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oge_tutor_ci?schema=public
  JWT_SECRET: ci-test-secret
  PUBLIC_BACKEND_URL: http://localhost:3000
  APP_FRONTEND_URL: http://localhost:5173
  FRONTEND_ORIGIN: http://localhost:5173
  MAILER_PROVIDER: noop
  VITE_API_BASE_URL: http://localhost:3000
  VITE_USE_MOCK: "false"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir oge-tutor-backend run prisma:generate

      - name: Build backend
        run: pnpm --dir oge-tutor-backend run build

      - name: Lint backend
        run: pnpm --dir oge-tutor-backend run lint

      - name: Test backend
        run: pnpm --dir oge-tutor-backend test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir oge-tutor-app run build

      - name: Lint frontend
        run: pnpm --dir oge-tutor-app run lint

      - name: Typecheck frontend
        run: pnpm --dir oge-tutor-app run typecheck

      - name: Test frontend
        run: pnpm --dir oge-tutor-app test

  prisma-db-check:
    name: Prisma Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oge_tutor_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oge_tutor_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oge_tutor_ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir oge-tutor-backend run prisma:generate

      - name: Apply migrations
        run: pnpm --dir oge-tutor-backend exec prisma migrate deploy

      - name: Check migration status
        run: pnpm --dir oge-tutor-backend exec prisma migrate status

  e2e:
    name: AppModule E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oge_tutor_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oge_tutor_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oge_tutor_e2e?schema=public
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oge_tutor_e2e?schema=public
      JWT_SECRET: e2e-test-secret
      PUBLIC_BACKEND_URL: http://localhost:3000
      APP_FRONTEND_URL: http://localhost:5173
      FRONTEND_ORIGIN: http://localhost:5173
      MAILER_PROVIDER: noop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir oge-tutor-backend run prisma:generate

      - name: Apply migrations
        run: pnpm --dir oge-tutor-backend exec prisma migrate deploy

      - name: Run AppModule e2e tests
        run: pnpm --dir oge-tutor-backend run test:e2e

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f oge-tutor-backend/Dockerfile -t oge-tutor-backend:ci .

      - name: Build frontend image
        run: docker build -f oge-tutor-app/Dockerfile --build-arg VITE_API_BASE_URL=http://localhost:3000 -t oge-tutor-frontend:ci .

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit workspace dependencies
        run: pnpm audit --audit-level moderate
