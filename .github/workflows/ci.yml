name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PNPM_VERSION: 9.15.9
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oge_tutor_ci?schema=public

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir oge-tutor-backend run prisma:generate

      - name: Build backend
        run: pnpm --dir oge-tutor-backend run build

      - name: Lint backend
        run: pnpm --dir oge-tutor-backend run lint

      - name: Test backend
        run: pnpm --dir oge-tutor-backend test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir oge-tutor-app run build

      - name: Lint frontend
        run: pnpm --dir oge-tutor-app run lint

      - name: Typecheck frontend
        run: pnpm --dir oge-tutor-app run typecheck

      - name: Test frontend
        run: pnpm --dir oge-tutor-app test

  prisma-db-check:
    name: Prisma Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oge_tutor_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oge_tutor_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oge_tutor_ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir oge-tutor-backend run prisma:generate

      - name: Apply migrations
        run: pnpm --dir oge-tutor-backend exec prisma migrate deploy

      - name: Check migration status
        run: pnpm --dir oge-tutor-backend exec prisma migrate status

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit workspace dependencies
        run: pnpm audit --audit-level moderate
